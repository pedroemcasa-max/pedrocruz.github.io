<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portefólio — Pedro Cruz</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Helvetica, Arial, sans-serif;
    background: #1f1f1d;
    color: #e8e5dc;
}

header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid rgba(232,229,220,0.18);
}

header a {
    color: #e8e5dc;
    text-decoration: none;
    font-size: 13px;
    margin-right: 22px;
}

main {
    padding: 56px 40px 80px;
}

.head {
    max-width: 720px;
    margin-bottom: 60px;
}

h1 {
    margin: 0 0 14px;
    font-size: 30px;
    font-weight: 400;
}

.intro {
    font-size: 15px;
    line-height: 1.65;
    color: #c8c3b8;
}

/* layout exposição */
.grid {
    display: flex;
    flex-direction: column;
    gap: 80px;
}

.row {
    display: flex;
    gap: 40px;
    align-items: flex-start;
}

.row.single img {
    max-width: 60%;
}

.row.double img {
    max-width: calc(50% - 20px);
}

.row.offset img:first-child {
    margin-top: 60px;
}

.grid img {
    width: auto;
    height: auto;
    max-width: 100%;
    display: block;
}

@media (max-width: 900px) {
    main, header {
        padding-left: 22px;
        padding-right: 22px;
    }

    .row {
        flex-direction: column;
    }

    .row.single img,
    .row.double img {
        max-width: 100%;
        width: 100%;
        margin-top: 0;
    }

    h1 {
        font-size: 26px;
    }
}
</style>
</head>

<body>

<header>
    <a href="../index.html">← Projetos</a>
    <a href="../about.html">Sobre</a>
</header>

<main>

<section class="head">
    <h1>Portefólio</h1>
    <div class="intro">
        Seleção de imagens em torno da paisagem, da memória, da arquitectura
        e da instabilidade da imagem fotográfica.
    </div>
</section>

<section class="grid">

<div class="row single">
    <img src="../assets/portefolio/portefolio_web-1.jpg">
</div>

<div class="row double">
    <img src="../assets/portefolio/portefolio_web-4.jpg">
    <img src="../assets/portefolio/portefolio_web-5.jpg">
</div>

<div class="row single">
    <img src="../assets/portefolio/portefolio_web-8.jpg">
</div>

<div class="row double offset">
    <img src="../assets/portefolio/portefolio_web-9.jpg">
    <img src="../assets/portefolio/portefolio_web-11.jpg">
</div>

<div class="row double">
    <img src="../assets/portefolio/portefolio_web-14.jpg">
    <img src="../assets/portefolio/portefolio_web-12.jpg">
</div>

<div class="row single">
    <img src="../assets/portefolio/portefolio_web-13.jpg">
</div>

<div class="row double">
    <img src="../assets/portefolio/portefolio_web-15.jpg">
    <img src="../assets/portefolio/portefolio_web-16.jpg">
</div>

<div class="row single">
    <img src="../assets/portefolio/portefolio_web-17.jpg">
</div>

<div class="row double">
    <img src="../assets/portefolio/portefolio_web-18.jpg">
    <img src="../assets/portefolio/portefolio_web-19.jpg">
</div>

<div class="row single">
    <img src="../assets/portefolio/portefolio_web-20.jpg">
</div>

<div class="row single">
    <img src="../assets/portefolio/portefolio_web-22.jpg">
</div>

</section>

</main>

</body>
</html>
