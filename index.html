<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedro Cruz</title>

<style>
body {
    margin: 0;
    font-family: Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #111;
}

/* topo */
header {
    padding: 40px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 32px;
    font-weight: normal;
}

/* grelha de projetos */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 40px;
}

.project {
    position: relative;
}

.project img {
    width: 100%;
    display: block;
}

.project span {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(255,255,255,0.8);
    padding: 5px 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <h1>Pedro Cruz</h1>
</header>

<div class="grid">

    <div class="project">
        <img src="assets/cas/cas01.jpg">
        <span>Last Night</span>
    </div>

    <div class="project">
        <img src="assets/mia/mia01.jpg">
        <span>Inside the Sound</span>
    </div>

    <div class="project">
        <img src="assets/pb/Paisagen_pb01.jpg">
        <span>Under the Same Weather</span>
    </div>

</div>

</body>
</html>
