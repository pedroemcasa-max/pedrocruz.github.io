<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Pedro Cruz — Exhibition Wall</title>

<style>
/* RESET */
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: #0a0a0a;
  color: #e6e6e6;
  font-family: Helvetica, Arial, sans-serif;
}

/* MAIN CONTAINER */
#wall {
  width: 1920px;
  height: 1080px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 80px 120px;
}

/* HEADER */
header {
  text-align: center;
}

header h1 {
  font-size: 28px;
  font-weight: 400;
  letter-spacing: 1px;
}

header p {
  margin-top: 8px;
  font-size: 13px;
  opacity: .6;
}

/* PROJECT BLOCK */
.project {
  margin-top: 70px;
}

.project-meta {
  margin-bottom: 26px;
}

.project-meta h2 {
  font-size: 18px;
  font-weight: 400;
  letter-spacing: .5px;
}

.project-meta p {
  font-size: 12px;
  opacity: .55;
  margin-top: 4px;
}

/* IMAGE STRIP */
.strip {
  display: flex;
  gap: 30px;
}

.strip img {
  height: 260px;
  object-fit: contain;
  background: #000;
}

/* FOOTER */
footer {
  text-align: center;
  font-size: 11px;
  opacity: .4;
  margin-top: auto;
}
</style>
</head>

<body>

<div id="wall">

<header>
  <h1>Pedro Cruz</h1>
  <p>Fotografia · Improvisação · Presença</p>
</header>

<!-- PROJECT 1 -->
<div class="project">
  <div class="project-meta">
    <h2>From Blue Walls to White Silence</h2>
    <p>Chefchaouen, Morocco · 2007</p>
  </div>

  <div class="strip">
    <img src="./assets/cor/Paisagen_cheff01.jpg">
    <img src="./assets/cor/Paisagen_cheff02.jpg">
    <img src="./assets/cor/Paisagen_cheff04.jpg">
    <img src="./assets/cor/Paisagen_cheff06.jpg">
    <img src="./assets/cor/Paisagen_cheff07.jpg">
  </div>
</div>

<!-- PROJECT 2 -->
<div class="project">
  <div class="project-meta">
    <h2>Under the Same Weather</h2>
    <p>Five Landscapes with Distance</p>
  </div>

  <div class="strip">
    <img src="./assets/pb/Paisagen_pb01.jpg">
    <img src="./assets/pb/Paisagen_pb02.jpg">
    <img src="./assets/pb/Paisagen_pb03.jpg">
    <img src="./assets/pb/Paisagen_pb05.jpg">
    <img src="./assets/pb/Paisagen_pb08.jpg">
  </div>
</div>

<!-- PROJECT 3 -->
<div class="project">
  <div class="project-meta">
    <h2>Inside the Sound</h2>
    <p>Improvisation as shared listening</p>
  </div>

  <div class="strip">
    <img src="./assets/mia/mia01.jpg">
    <img src="./assets/mia/mia03.jpg">
    <img src="./assets/mia/mia05.jpg">
    <img src="./assets/mia/mia07.jpg">
    <img src="./assets/mia/mia09.jpg">
  </div>
</div>

<!-- PROJECT 4 -->
<div class="project">
  <div class="project-meta">
    <h2>Last Night</h2>
    <p>Variations on permanence and disappearance</p>
  </div>

  <div class="strip">
    <img src="./assets/cas/cas01.jpg">
    <img src="./assets/cas/cas02.jpg">
    <img src="./assets/cas/cas03.jpg">
    <img src="./assets/cas/cas04.jpg">
    <img src="./assets/cas/cas05.jpg">
    <img src="./assets/cas/cas06.jpg">
    <img src="./assets/cas/cas07.jpg">
    <img src="./assets/cas/cas08.jpg">
  </div>
</div>

<footer>
  © 2025 — Pedro Cruz
</footer>

</div>

</body>
</html>
