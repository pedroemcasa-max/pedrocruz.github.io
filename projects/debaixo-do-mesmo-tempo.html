
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debaixo do Mesmo Tempo — Pedro Cruz</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Helvetica, Arial, sans-serif;
    background: #1f1f1d;
    color: #e8e5dc;
}

header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid rgba(232,229,220,0.18);
}

header a {
    color: #e8e5dc;
    text-decoration: none;
    font-size: 13px;
}

main {
    padding: 42px 40px 60px;
}

.project-head {
    max-width: 820px;
    margin-bottom: 42px;
}

h1 {
    margin: 0 0 14px;
    font-size: 34px;
    font-weight: 400;
}

.meta {
    color: #aaa59b;
    font-size: 14px;
    margin-bottom: 24px;
}

.text {
    max-width: 640px;
    font-size: 16px;
    line-height: 1.65;
    color: #c8c3b8;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
}

.gallery img {
    width: 100%;
    display: block;
    background: #111;
}

footer {
    padding: 24px 40px 38px;
    font-size: 12px;
    color: #8f8a82;
}

@media (max-width: 800px) {
    main, header, footer {
        padding-left: 22px;
        padding-right: 22px;
    }

    .gallery {
        grid-template-columns: 1fr;
    }

    h1 {
        font-size: 28px;
    }
}

<header>

<main>

<section class="project-head">
    <h1>Debaixo do Mesmo Tempo</h1>
    <div class="meta">Paisagem · preto e branco</div>

    <div class="text">
        <p>
            Série construída a partir da paisagem como campo de permanência,
            deslocação e suspensão. A imagem não procura apenas descrever um lugar,
            mas aproximar-se da forma como o tempo se deposita sobre ele.
        </p>
    </div>
</section>

<section class="gallery">
    <img src="../assets/pb/Paisagen_pb01.jpg">
    <img src="../assets/pb/Paisagen_pb02.jpg">

</main>

<footer>

</footer>
