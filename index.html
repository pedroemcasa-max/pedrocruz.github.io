  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #0b0b0b;
      color: #f5f5f5;
    }
    header {
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('./assets/cor/Paisagen_cheff05.jpg');
      background-size: cover;
      background-position: center;
    }
    header h1 { font-size: 3.5rem; letter-spacing: 2px; }
    header p { font-size: 1.3rem; opacity: 0.9; }
    section { padding: 80px 20px; max-width: 1400px; margin: auto; }
    h2, h3 { text-align: center; letter-spacing: 1px; }
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }
    .card {
      height: 280px;
      border-radius: 14px;
      background-size: cover;
      background-position: center;
      cursor: pointer;
      transition: transform 0.4s ease;
    }
    .card:hover { transform: scale(1.03); }

    /* FULLSCREEN VIEW */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
    }
    .lightbox.active { display: flex; }

    footer { text-align: center; padding: 40px; color: #777; }

    .card {
  position: relative;
  overflow: hidden;
}

.card::after {
  content: attr(data-title);
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-end;
  padding: 20px;
  font-size: 1.1rem;
  letter-spacing: 0.5px;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent 60%);
  opacity: 0;
  transition: opacity 0.3s ease;
}

/* Desktop: aparece no hover */
.card:hover::after {
  opacity: 1;
}

/* Mobile: sempre visível */
@media (hover: none) {
  .card::after {
    opacity: 1;
  }
}

  </style>
</head>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button onclick="prevImage(event)">‹</button>
  <div style="text-align:center;">
    <img id="lightbox-img" />
    <p id="lightbox-title" style="opacity:.8; margin-top:12px;"></p>
  </div>
  <button onclick="nextImage(event)">›</button>
</div>


<script>
  let images = [];
  let cards = [];
  let currentIndex = 0;
  let currentGroup = '';
  let startX = 0;

  function openLightboxFromGroup(group, index) {
    currentGroup = group;
    cards = Array.from(document.querySelectorAll(`[data-group='${group}']`));
    images = cards.map(card =>
      card.style.backgroundImage.slice(5, -2)
    );

    currentIndex = index;
    showImage();
    document.getElementById('lightbox').classList.add('active');
  }

  function showImage() {
    const img = document.getElementById('lightbox-img');
    const title = document.getElementById('lightbox-title');

    img.src = images[currentIndex];
    title.textContent = cards[currentIndex].dataset.title || '';
  }

  function nextImage(e) {
    if (e) e.stopPropagation();
    currentIndex = (currentIndex + 1) % images.length;
    showImage();
  }

  function prevImage(e) {
    if (e) e.stopPropagation();
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showImage();
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
  }

  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('lightbox').classList.contains('active')) return;
    if (e.key === 'ArrowRight') nextImage();
    if (e.key === 'ArrowLeft') prevImage();
    if (e.key === 'Escape') closeLightbox();
  });

  const lightbox = document.getElementById('lightbox');
  lightbox.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
  });

  lightbox.addEventListener('touchend', e => {
    const endX = e.changedTouches[0].clientX;
    if (startX - endX > 50) nextImage();
    if (endX - startX > 50) prevImage();
  });
</script>
