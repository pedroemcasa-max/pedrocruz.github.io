<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedro Cruz</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Helvetica, Arial, sans-serif;
  background: #0b0b0b;
  color: #eaeaea;
  line-height: 1.6;
}

header {
  min-height: 80vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

header h1 {
  font-size: 2.2rem;
  font-weight: 400;
  letter-spacing: 1px;
}

header p {
  margin-top: 12px;
  font-size: .95rem;
  opacity: .7;
}

section {
  max-width: 1400px;
  margin: 0 auto;
  padding: 120px 24px;
}

.project-meta {
  text-align: center;
  margin-bottom: 60px;
}

.project-meta h2 {
  font-size: 1.4rem;
  font-weight: 400;
  letter-spacing: .5px;
  margin-bottom: 8px;
}

.project-meta p {
  font-size: .9rem;
  opacity: .6;
  margin: 4px 0;
}

.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 40px;
}

.card {
  aspect-ratio: 4 / 3;
  background-size: cover;
  background-position: center;
  cursor: pointer;
  transition: opacity .4s ease;
}

.card:hover {
  opacity: .85;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.96);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  z-index: 9999;
}

.lightbox.active { display: flex; }

.lightbox img {
  max-width: 92vw;
  max-height: 82vh;
  object-fit: contain;
}

.lightbox .caption {
  margin-top: 20px;
  font-size: .85rem;
  opacity: .6;
  text-align: center;
}

footer {
  padding: 80px 20px;
  text-align: center;
  font-size: .8rem;
  opacity: .5;
}
</style>
</head>

<body>

<header>
  <div>
    <h1>Pedro Cruz</h1>
    <p>Fotografia · Improvisação · Presença</p>
  </div>
</header>

<section id="projects"></section>

<footer>© 2025 — Pedro Cruz</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" alt="">
  <div class="caption" id="lightbox-caption"></div>
</div>

<script>
/* ===== DADOS ===== */
const projects = [
  {
    id: "cor",
    title: "From Blue Walls to White Silence",
    subtitle: "Chefchaouen, Morocco · 2007",
    text: "A city absorbed by its own color.",
    images: [
      { src: "./assets/cor/Paisagen_cheff01.jpg", title: "The Living City" },
      { src: "./assets/cor/Paisagen_cheff02.jpg", title: "Leaving The Walls" },
      { src: "./assets/cor/Paisagen_cheff04.jpg", title: "The Watcher" },
      { src: "./assets/cor/Paisagen_cheff06.jpg", title: "Frozen Ascent" },
      { src: "./assets/cor/Paisagen_cheff07.jpg", title: "White Silence" }
    ]
  },

  {
    id: "pb",
    title: "Under the Same Weather",
    subtitle: "Five Landscapes with Distance",
    text: "Landscapes shaped by hesitation. Nothing happens — and that is the moment.",
    images: [
      { src: "./assets/pb/Paisagen_pb01.jpg", title: "Before the Weather Decides" },
      { src: "./assets/pb/Paisagen_pb02.jpg", title: "The Sky Gathers Itself" },
      { src: "./assets/pb/Paisagen_pb03.jpg", title: "A Small Passage" },
      { src: "./assets/pb/Paisagen_pb05.jpg", title: "Between Crossing and Waiting" },
      { src: "./assets/pb/Paisagen_pb08.jpg", title: "Night Path" }
    ]
  },

  {
    id: "mia",
    title: "Inside the Sound",
    subtitle: "Exploring improvisation as a shared act of listening",
    text: "Images negotiate space, rhythm, and presence.",
    images: [
      { src: "./assets/mia/mia01.jpg", title: "Before the Agreement" },
      { src: "./assets/mia/mia03.jpg", title: "Finding the Thread" },
      { src: "./assets/mia/mia05.jpg", title: "Letting Go" },
      { src: "./assets/mia/mia07.jpg", title: "Negotiation" },
      { src: "./assets/mia/mia09.jpg", title: "Statement" }
    ]
  },

  {
    id: "cas",
    title: "Last Night",
    subtitle: "Variations on permanence, time, and disappearance",
    text: "Photographed from the balcony on the last night of my childhood home.",
    images: [
      { src: "./assets/cas/cas01.jpg", title: "Before It Shifts" },
      { src: "./assets/cas/cas02.jpg", title: "First Fracture" },
      { src: "./assets/cas/cas03.jpg", title: "Unstable Image" },
      { src: "./assets/cas/cas04.jpg", title: "Suspended Memory" },
      { src: "./assets/cas/cas05.jpg", title: "Domestic Echo" },
      { src: "./assets/cas/cas06.jpg", title: "Pattern of Permanence" },
      { src: "./assets/cas/cas07.jpg", title: "Material Collapse" },
      { src: "./assets/cas/cas08.jpg", title: "After the House" }
    ]
  }
];

/* ===== RENDER ===== */
const container = document.getElementById("projects");

projects.forEach(project => {
  container.insertAdjacentHTML("beforeend", `
    <div class="project-meta">
      <h2>${project.title}</h2>
      <p>${project.subtitle}</p>
      <p>${project.text}</p>
    </div>
    <div class="projects" data-project="${project.id}"></div>
  `);

  const grid = container.querySelector(`[data-project='${project.id}']`);

  project.images.forEach((img, index) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.backgroundImage = \`url('\${img.src}')\`;
    card.onclick = () => openLightbox(project, index);
    grid.appendChild(card);
  });
});

/* ===== LIGHTBOX ===== */
let currentProject = null;
let currentIndex = 0;

function openLightbox(project, index) {
  currentProject = project;
  currentIndex = index;
  showImage();
  document.getElementById("lightbox").classList.add("active");
}

function showImage() {
  const img = document.getElementById("lightbox-img");
  const caption = document.getElementById("lightbox-caption");
  img.src = currentProject.images[currentIndex].src;
  caption.textContent = currentProject.images[currentIndex].title;
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("active");
}

document.addEventListener("keydown", e => {
  const lb = document.getElementById("lightbox");
  if (!lb.classList.contains("active")) return;

  if (e.key === "ArrowRight") {
    currentIndex = (currentIndex + 1) % currentProject.images.length;
    showImage();
  }
  if (e.key === "ArrowLeft") {
    currentIndex = (currentIndex - 1 + currentProject.images.length) % currentProject.images.length;
    showImage();
  }
  if (e.key === "Escape") closeLightbox();
});
</script>

</body>
</html>
